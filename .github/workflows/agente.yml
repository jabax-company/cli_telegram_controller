name: Agente Claude Code

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt refinado para Claude Code"
        required: true
      repo_objetivo:
        description: "Repositorio objetivo (owner/nombre)"
        required: true
      rama_base:
        description: "Rama base del repositorio objetivo"
        default: "main"
        required: false
      chat_id:
        description: "Telegram chat ID para notificación de vuelta"
        required: true

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio objetivo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_objetivo }}
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.inputs.rama_base }}

      - name: Configurar Git
        run: |
          git config user.name "Claude Code Agent"
          git config user.email "agent@claude-code.bot"

      - name: Crear rama de agente
        id: branch
        run: |
          BRANCH="agent/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Ejecutar Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_PROMPT: ${{ github.event.inputs.prompt }}
        run: claude --print --dangerously-skip-permissions "$CLAUDE_PROMPT"

      - name: Commit cambios
        id: commit
        env:
          CLAUDE_PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          git add -A
          git status --short
          if [ -z "$(git status --short)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Claude Code no realizó cambios en el árbol de ficheros."
          else
            TITLE=$(printf '%s' "$CLAUDE_PROMPT" | head -c 72)
            git commit -m "feat: ${TITLE}" \
                       -m "" \
                       -m "Generado automáticamente por Claude Code Agent."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rama
        if: steps.commit.outputs.changed == 'true'
        run: git push origin ${{ steps.branch.outputs.branch }}

      - name: Crear Pull Request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CLAUDE_PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          printf "## Cambios generados por Claude Code Agent\n\nPrompt ejecutado:\n\n%s\n\n---\nPR creado automaticamente por el Mobile Coding Agent." "$CLAUDE_PROMPT" > /tmp/pr_body.txt
          PR_URL=$(gh pr create \
            --repo "${{ github.event.inputs.repo_objetivo }}" \
            --base "${{ github.event.inputs.rama_base }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "feat: agente Claude Code" \
            --body-file /tmp/pr_body.txt)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notificar resultado a Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          if [ "$CHANGED" = "true" ] && [ -n "$PR_URL" ]; then
            MSG="PR listo: ${PR_URL}"
          elif [ "$CHANGED" = "true" ]; then
            MSG="Rama creada pero no se pudo generar el PR. Revisa: https://github.com/${{ github.event.inputs.repo_objetivo }}/branches"
          else
            MSG="Claude Code no realizo cambios en el repositorio."
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Telegram HTTP $HTTP_CODE: $BODY"
          [ "$HTTP_CODE" = "200" ] || exit 1
